<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>バヤシっち</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Maru Gothic ProN', 'Yu Gothic', 'Meiryo', system-ui, sans-serif;
    background: linear-gradient(135deg, #ffd6ec 0%, #c7e0ff 50%, #d6f5e8 100%);
    min-height: 100vh;
    padding: 12px;
    color: #3a3a5c;
  }
  .container {
    max-width: 520px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 16px;
    box-shadow: 0 10px 40px rgba(180, 140, 200, 0.25);
    border: 2px solid rgba(255, 255, 255, 0.8);
  }
  h1 {
    text-align: center;
    font-size: 22px;
    background: linear-gradient(90deg, #ff6fa3, #7a8fff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
  }
  .subtitle {
    text-align: center;
    font-size: 11px;
    color: #8b7aa3;
    margin-bottom: 10px;
  }
  .stage-bar {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 14px; padding: 8px 12px; margin-bottom: 10px;
  }
  .stage-emoji { font-size: 28px; line-height: 1; }
  .stage-info { flex: 1; }
  .stage-name { font-size: 13px; font-weight: 800; color: #5a4a7a; margin-bottom: 3px; }
  .stage-progress-wrap { height: 6px; background: rgba(150, 130, 180, 0.15); border-radius: 6px; overflow: hidden; margin-bottom: 2px; }
  .stage-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ffd97a, #ff9ec7, #a7a0ff);
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
    transition: width 0.5s;
  }
  @keyframes shimmer { 0% { background-position: 0 0; } 100% { background-position: 200% 0; } }
  .stage-next-text { font-size: 10px; color: #8b7aa3; }
  .stage {
    position: relative; width: 100%; height: 320px;
    background: linear-gradient(180deg, #e7f0ff 0%, #fff0f8 100%);
    border-radius: 18px; overflow: hidden;
    box-shadow: inset 0 4px 12px rgba(150, 130, 180, 0.15);
    margin-bottom: 12px;
  }
  #canvas { width: 100%; height: 100%; display: block; }
  .loading {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; color: #8b7aa3; font-size: 12px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #ffd6ec; border-top-color: #ff6fa3;
    border-radius: 50%; margin: 0 auto 8px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .message {
    position: absolute; top: 10px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.95);
    padding: 6px 14px; border-radius: 18px;
    font-size: 12px; font-weight: 700; color: #ff6fa3;
    box-shadow: 0 4px 12px rgba(255, 111, 163, 0.25);
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .message.show { opacity: 1; }
  .mood {
    position: absolute; bottom: 10px; left: 10px;
    background: rgba(255, 255, 255, 0.9);
    padding: 5px 10px; border-radius: 14px;
    font-size: 11px; font-weight: 700; color: #7a8fff;
  }
  .particle {
    position: absolute; font-size: 26px;
    pointer-events: none; z-index: 5;
    animation: float-up 1.8s ease-out forwards;
  }
  @keyframes float-up {
    0% { transform: translate(-50%, 0) scale(0.3); opacity: 0; }
    20% { transform: translate(-50%, -12px) scale(1.1); opacity: 1; }
    100% { transform: translate(-50%, -120px) scale(0.7); opacity: 0; }
  }
  .overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 100; border-radius: 18px;
    animation: fadeIn 0.5s;
  }
  .overlay.hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .overlay-gameover {
    background: rgba(40, 20, 60, 0.75);
    backdrop-filter: blur(6px);
  }
  .overlay-clear {
    background: radial-gradient(circle, rgba(255,200,230,0.92), rgba(180,200,255,0.92));
    backdrop-filter: blur(8px); overflow: hidden;
  }
  .overlay-start {
    background: linear-gradient(135deg, rgba(255,214,236,0.95), rgba(199,224,255,0.95));
    backdrop-filter: blur(8px);
  }
  .start-emoji { font-size: 72px; margin-bottom: 8px; animation: bounce 1.2s ease-in-out infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  .start-title {
    font-size: 32px; font-weight: 900; letter-spacing: 2px; margin-bottom: 4px;
    background: linear-gradient(90deg, #ff6fa3, #7a8fff);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .start-sub { font-size: 13px; font-weight: 700; color: #5a4a7a; margin-bottom: 3px; }
  .start-msg { font-size: 11px; color: #8b7aa3; margin-bottom: 16px; }
  .btn-start {
    background: linear-gradient(135deg, #ff6fa3, #7a8fff);
    padding: 14px 40px;
    font-size: 16px;
    box-shadow: 0 8px 20px rgba(255, 111, 163, 0.5);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .overlay-content { text-align: center; padding: 16px; z-index: 2; position: relative; }
  .over-emoji { font-size: 56px; margin-bottom: 6px; animation: sway 2s ease-in-out infinite; }
  @keyframes sway { 0%, 100% { transform: rotate(-5deg);} 50% { transform: rotate(5deg); } }
  .over-title { font-size: 18px; font-weight: 800; color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.3); margin-bottom: 4px; }
  .over-sub { font-size: 11px; color: rgba(255,255,255,0.85); margin-bottom: 14px; }
  .clear-emoji { font-size: 64px; margin-bottom: 6px; animation: spin-bounce 2s ease-in-out infinite; }
  @keyframes spin-bounce { 0%,100% { transform: scale(1) rotate(0); } 50% { transform: scale(1.2) rotate(10deg); } }
  .clear-title {
    font-size: 30px; font-weight: 900; letter-spacing: 2px; margin-bottom: 4px;
    background: linear-gradient(90deg, #ff5c8d, #ffb347, #7dce82, #6ec5ff, #b088ff);
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
  }
  .clear-sub { font-size: 14px; font-weight: 800; color: #5a4a7a; margin-bottom: 3px; }
  .clear-msg { font-size: 11px; color: #8b7aa3; margin-bottom: 14px; }
  .confetti { position: absolute; font-size: 20px; pointer-events: none; z-index: 1; animation: fall 3s linear infinite; }
  @keyframes fall { 0% { transform: translateY(-20px) rotate(0); opacity: 1; } 100% { transform: translateY(380px) rotate(360deg); opacity: 0; } }
  .btn {
    background: linear-gradient(135deg, #ff9ec7, #7a8fff);
    border: none; border-radius: 16px;
    padding: 10px 22px; font-size: 13px; font-weight: 800;
    color: white; cursor: pointer;
    box-shadow: 0 5px 15px rgba(122, 143, 255, 0.4);
    transition: transform 0.15s; font-family: inherit;
  }
  .btn:hover { transform: translateY(-2px); }
  .stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 10px;
  }
  .stat {
    background: rgba(255, 255, 255, 0.85);
    padding: 8px 10px; border-radius: 12px;
  }
  .stat-label {
    display: flex; justify-content: space-between;
    font-size: 11px; font-weight: 700;
    margin-bottom: 4px; color: #5a4a7a;
  }
  .bar { height: 7px; background: rgba(150, 130, 180, 0.15); border-radius: 7px; overflow: hidden; }
  .bar-fill {
    height: 100%; border-radius: 7px;
    transition: width 0.4s, background 0.3s;
    background: linear-gradient(90deg, #7aff9f, #4adf7e);
  }
  .bar-fill.mid { background: linear-gradient(90deg, #ffd97a, #ffb94a); }
  .bar-fill.low { background: linear-gradient(90deg, #ff9a9a, #ff5c5c); }
  .actions {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  }
  button.action {
    background: white; border: none;
    border-radius: 14px; padding: 10px 3px;
    font-size: 10px; font-weight: 700; color: #5a4a7a;
    cursor: pointer; transition: transform 0.15s;
    box-shadow: 0 3px 8px rgba(150, 130, 180, 0.18);
    font-family: inherit;
  }
  button.action:hover { transform: translateY(-2px); }
  button.action .emoji { display: block; font-size: 20px; margin-bottom: 2px; }
  .reset {
    display: block; margin: 10px auto 0;
    background: none; border: none; color: #bba;
    font-size: 10px; cursor: pointer;
    text-decoration: underline; font-family: inherit;
  }
</style>
</head>
<body>
<div class="container">
  <h1>バヤシっち</h1>
  <p class="subtitle">5分で虹のバヤシに しんかさせよう！</p>

  <div class="stage-bar">
    <span id="stage-emoji" class="stage-emoji">🥉</span>
    <div class="stage-info">
      <div id="stage-name" class="stage-name">銅のバヤシ</div>
      <div class="stage-progress-wrap"><div id="stage-progress-fill" class="stage-progress-fill" style="width:0%"></div></div>
      <div id="stage-next-text" class="stage-next-text">次: 銀まで…</div>
    </div>
  </div>

  <div class="stage">
    <canvas id="canvas"></canvas>
    <div id="loading" class="loading"><div class="spinner"></div><div>よみこみちゅう…</div></div>
    <div id="message" class="message"></div>
    <div id="mood" class="mood">😊 げんき</div>

    <div id="overlay-start" class="overlay overlay-start hidden">
      <div class="overlay-content">
        <div class="start-emoji">🥚</div>
        <div class="start-title">バヤシっち</div>
        <div class="start-sub">5分で虹のバヤシに しんかさせよう！</div>
        <div class="start-msg">毎秒3ずつゲージが減るよ ボタンでお世話して！</div>
        <button id="btn-start" class="btn btn-start">スタート</button>
      </div>
    </div>

    <div id="overlay-gameover" class="overlay overlay-gameover hidden">
      <div class="overlay-content">
        <div class="over-emoji">😵</div>
        <div class="over-title">バヤシがたおれちゃった…</div>
        <div class="over-sub">おせわが たりなかったみたい</div>
        <button id="btn-restart" class="btn">もういちど そだてる 🥚</button>
      </div>
    </div>

    <div id="overlay-clear" class="overlay overlay-clear hidden">
      <div id="confetti-container"></div>
      <div class="overlay-content">
        <div class="clear-emoji">🌈</div>
        <div class="clear-title">CLEAR!</div>
        <div class="clear-sub">虹のバヤシに しんかしました！</div>
        <div class="clear-msg">すばらしい おせわでした ✨</div>
        <button id="btn-continue" class="btn">つづける 🎮</button>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label"><span>🍚 おなか</span><span id="hunger-val">100</span></div><div class="bar"><div id="hunger-bar" class="bar-fill" style="width:100%"></div></div></div>
    <div class="stat"><div class="stat-label"><span>⚡ げんき</span><span id="energy-val">100</span></div><div class="bar"><div id="energy-bar" class="bar-fill" style="width:100%"></div></div></div>
    <div class="stat"><div class="stat-label"><span>💕 きげん</span><span id="happy-val">100</span></div><div class="bar"><div id="happy-bar" class="bar-fill" style="width:100%"></div></div></div>
    <div class="stat"><div class="stat-label"><span>🛁 せいけつ</span><span id="clean-val">100</span></div><div class="bar"><div id="clean-bar" class="bar-fill" style="width:100%"></div></div></div>
  </div>

  <div class="actions">
    <button class="action" data-action="feed"><span class="emoji">🍚</span>ごはん</button>
    <button class="action" data-action="play"><span class="emoji">🎾</span>あそぶ</button>
    <button class="action" data-action="sleep"><span class="emoji">💤</span>ねる</button>
    <button class="action" data-action="bath"><span class="emoji">🛁</span>おふろ</button>
    <button class="action" data-action="pet"><span class="emoji">💖</span>なでる</button>
  </div>

  <button class="reset" id="btn-reset">セーブデータをリセット</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ==================== CONFIG ====================
const GLB_URL = 'https://raw.githubusercontent.com/shigerizian-sys/tamagotchi-assets1/main/2.glb';
const STORAGE_KEY = 'bayashicchi-v2';
// Decay per second (3 points per stat per second)
const DECAY_PER_SEC = { hunger: 3, energy: 3, happiness: 3, cleanliness: 3 };
// Keep per-minute for offline calculation
const DECAY = { hunger: 180, energy: 180, happiness: 180, cleanliness: 180 };

const STAGES = [
  { id: 'bronze',  name: '銅のバヤシ', emoji: '🥉', minMin: 0,   ring: 0xcd7f32, op: 0.7 },
  { id: 'silver',  name: '銀のバヤシ', emoji: '🥈', minMin: 1.5, ring: 0xd8d8d8, op: 0.85 },
  { id: 'gold',    name: '金のバヤシ', emoji: '🥇', minMin: 3,   ring: 0xffd700, op: 1.0 },
  { id: 'rainbow', name: '虹のバヤシ', emoji: '🌈', minMin: 5,   ring: null,     op: 1.0 }
];

const ACTION_KWS = {
  feed: [],
  play: ['happy_jump','cardio_dance','jazz_danc','superlove_pop_dance','shake_it_off','omg_groove','gangnam_groove','you_groove','clapping_run','arm_circle_shuffle','crystal_beads','dont_you_dare'],
  sleep: [],
  bath: [],
  pet: ['wave_one_hand','wave']
};

const MOOD_ANIMS = {
  hungry: { clips:['angry_ground_stomp'], msg:'おなかすいた…💢', parts:['💢','💦','😤','💨'] },
  tired:  { clips:['sit_lie_bed','sit_cross_legged_on_floor'], msg:'つかれた…💤', parts:['💤','😴','✨'] },
  sad:    { clips:['sit_cross_legged_on_floor'], msg:'さみしい…', parts:['💧','😢','🥺'] },
  dirty:  { clips:[], msg:'おふろに入りたい…', parts:['💨','🌀','💧'] },
  joyful: { clips:['happy_jump_m','cardio_dance','superlove_pop_dance','omg_groove','clapping_run'], msg:'うれしい！🎉', parts:['✨','💖','🌟','🎉'] }
};

const PARTS = {
  feed: ['🍚','🍙','🍘','✨'],
  play: ['🎾','⚽','🎮','⭐'],
  sleep: ['💤','😴','✨'],
  bath: ['🫧','💧','✨','🛁'],
  pet: ['💖','💕','❤️','✨']
};

// ==================== STATE ====================
const DEFAULTS = () => ({
  hunger: 95, energy: 95, happiness: 95, cleanliness: 95,
  lastUpdate: Date.now(), birthTime: Date.now(),
  isDead: false, cleared: false, started: false
});
let stats = DEFAULTS();
let lastStageId = null;
let lastMoodTrigger = 0;
const MOOD_CD = 20000;

let character = null, mixer = null, currentAction = null;
const animClips = {};
let defaultAnimName = null;
let baseScale = 1, walkSpeed = 1.0;
let actionState = null;

const $ = (id) => document.getElementById(id);
const stageEl = document.querySelector('.stage');

// ==================== STORAGE ====================
const storage = {
  async get(k) {
    try { if (window.storage && window.storage.get) return await window.storage.get(k); } catch(e){}
    try { const v = localStorage.getItem(k); return v ? { key:k, value:v } : null; } catch(e){ return null; }
  },
  async set(k, v) {
    try { if (window.storage && window.storage.set) return await window.storage.set(k, v); } catch(e){}
    try { localStorage.setItem(k, v); return { key:k, value:v }; } catch(e){ return null; }
  }
};

// ==================== THREE.JS ====================
const canvas = $('canvas');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(50, stageEl.clientWidth/stageEl.clientHeight, 0.1, 100);
camera.position.set(0, 1.3, 3.5);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(stageEl.clientWidth, stageEl.clientHeight, false);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.9, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.8;
controls.maxDistance = 7;
controls.minPolarAngle = 0.2;
controls.maxPolarAngle = Math.PI/2 - 0.05;
controls.enablePan = false;
controls.update();

scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const dir = new THREE.DirectionalLight(0xffffff, 1.4); dir.position.set(3, 6, 4); scene.add(dir);
const rim = new THREE.DirectionalLight(0xffe8f5, 0.8); rim.position.set(-4, 3, -3); scene.add(rim);
const front = new THREE.DirectionalLight(0xffffff, 0.6); front.position.set(0, 2, 5); scene.add(front);

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(1.1, 48),
  new THREE.MeshStandardMaterial({ color: 0xffc7dd, roughness: 0.9 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

const ringMat = new THREE.MeshBasicMaterial({ color: 0xcd7f32, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
const ring = new THREE.Mesh(new THREE.RingGeometry(1.05, 1.18, 48), ringMat);
ring.rotation.x = -Math.PI/2;
ring.position.y = 0.001;
scene.add(ring);

new GLTFLoader().load(GLB_URL, (gltf) => {
  character = gltf.scene;
  character.traverse((c) => {
    if (c.isMesh && c.material) {
      const mats = Array.isArray(c.material) ? c.material : [c.material];
      mats.forEach(m => {
        if (m.map) m.map.colorSpace = THREE.SRGBColorSpace;
        if (m.emissiveMap) m.emissiveMap.colorSpace = THREE.SRGBColorSpace;
        m.needsUpdate = true;
      });
    }
  });
  const box = new THREE.Box3().setFromObject(character);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  baseScale = 1.2 / maxDim;
  character.scale.setScalar(baseScale);

  const box2 = new THREE.Box3().setFromObject(character);
  const center2 = box2.getCenter(new THREE.Vector3());
  character.position.x -= center2.x;
  character.position.z -= center2.z;
  character.position.y -= box2.min.y;
  scene.add(character);

  if (gltf.animations && gltf.animations.length) {
    mixer = new THREE.AnimationMixer(character);
    gltf.animations.forEach(clip => { animClips[clip.name.toLowerCase()] = clip; });
    const names = Object.keys(animClips);
    console.log(`[バヤシっち] アニメ ${names.length}種:`, names);
    defaultAnimName = findClipName(['idle','stand','wait']) || findClipName(['walk','walking','歩く']) || names[0];
    if (defaultAnimName) playAnimation(defaultAnimName, true, 0);
  }

  $('loading').style.display = 'none';
  if (stats.isDead) showGameOver();
}, undefined, (err) => {
  console.error(err);
  $('loading').innerHTML = '<div style="color:#ff6fa3">GLB読込失敗</div>';
});

window.addEventListener('resize', () => {
  camera.aspect = stageEl.clientWidth / stageEl.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(stageEl.clientWidth, stageEl.clientHeight, false);
});

// ==================== ANIM HELPERS ====================
function findClipName(kws) {
  const names = Object.keys(animClips);
  for (const k of kws) { const f = names.find(n => n.includes(k)); if (f) return f; }
  return null;
}
function findAllClipNames(kws) {
  const names = Object.keys(animClips);
  const s = new Set();
  for (const k of kws) names.forEach(n => { if (n.includes(k)) s.add(n); });
  return [...s];
}
function playAnimation(name, loop = true, fade = 0.3) {
  if (!mixer || !animClips[name]) return null;
  const a = mixer.clipAction(animClips[name]);
  if (currentAction && currentAction !== a) currentAction.fadeOut(fade);
  a.reset();
  a.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
  a.clampWhenFinished = !loop;
  a.fadeIn(fade).play();
  currentAction = a;
  return a;
}

// ==================== GAME LOGIC ====================
function clamp(v) { return Math.max(0, Math.min(100, v)); }
function aliveMin() { return (Date.now() - stats.birthTime) / 60000; }
function anyStatZero() { return stats.hunger <= 0 || stats.energy <= 0 || stats.happiness <= 0 || stats.cleanliness <= 0; }

function getCurrentStage() {
  const m = aliveMin();
  let r = STAGES[0];
  for (const s of STAGES) if (m >= s.minMin) r = s;
  return r;
}
function getNextStage() {
  const i = STAGES.indexOf(getCurrentStage());
  return STAGES[i + 1] || null;
}

function updateBar(id, v) {
  const b = $(id+'-bar'), vl = $(id+'-val');
  b.style.width = v + '%';
  vl.textContent = Math.round(v);
  b.classList.remove('mid','low');
  if (v < 30) b.classList.add('low');
  else if (v < 60) b.classList.add('mid');
}
function updateUI() {
  updateBar('hunger', stats.hunger);
  updateBar('energy', stats.energy);
  updateBar('happy', stats.happiness);
  updateBar('clean', stats.cleanliness);
  updateMood();
}
function updateMood() {
  const { hunger, energy, happiness, cleanliness } = stats;
  const avg = (hunger + energy + happiness + cleanliness) / 4;
  const m = $('mood');
  if (hunger < 20) { m.textContent = '🍚 おなかすいた'; walkSpeed = 0.4; }
  else if (energy < 20) { m.textContent = '😴 つかれた'; walkSpeed = 0.3; }
  else if (happiness < 20) { m.textContent = '😢 さみしい'; walkSpeed = 0.4; }
  else if (cleanliness < 20) { m.textContent = '💧 おふろほしい'; walkSpeed = 0.6; }
  else if (avg > 80) { m.textContent = '🥰 とってもごきげん'; walkSpeed = 1.4; }
  else if (avg > 60) { m.textContent = '😊 げんき'; walkSpeed = 1.0; }
  else { m.textContent = '😐 ちょっとつかれた'; walkSpeed = 0.7; }
}
function updateStageUI() {
  const cur = getCurrentStage();
  const next = getNextStage();
  $('stage-emoji').textContent = cur.emoji;
  $('stage-name').textContent = cur.name;

  if (next) {
    const elapsed = aliveMin() - cur.minMin;
    const needed = next.minMin - cur.minMin;
    $('stage-progress-fill').style.width = Math.min(100, (elapsed/needed)*100) + '%';
    const r = Math.max(0, next.minMin - aliveMin());
    $('stage-next-text').textContent = `次: ${next.emoji} ${next.name.replace('のバヤシ','')} まで ${r < 1 ? Math.ceil(r*60)+'秒' : Math.ceil(r)+'分'}`;
  } else {
    $('stage-progress-fill').style.width = '100%';
    $('stage-next-text').textContent = '🌟 最強のバヤシ！';
  }

  if (lastStageId !== null && cur.id !== lastStageId) {
    showMessage(`✨ ${cur.name}に しんかした！`);
    spawnParts(['✨','🎉','⭐',cur.emoji,'💫']);
    if (cur.id === 'rainbow' && !stats.cleared) {
      stats.cleared = true;
      saveStats();
      const dances = findAllClipNames(['superlove_pop_dance','cardio_dance','omg_groove','happy_jump']);
      if (dances.length) playAnimation(dances[Math.floor(Math.random()*dances.length)], false, 0.3);
      setTimeout(showClear, 1200);
    }
  }
  lastStageId = cur.id;

  if (cur.id !== 'rainbow' && cur.ring != null) ringMat.color.setHex(cur.ring);
  ringMat.opacity = cur.op;
}

function showMessage(t) {
  const el = $('message');
  el.textContent = t;
  el.classList.add('show');
  clearTimeout(showMessage._t);
  showMessage._t = setTimeout(() => el.classList.remove('show'), 1800);
}

function spawnParts(emojis) {
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'particle';
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left = (42 + Math.random()*16) + '%';
      el.style.top = (55 + Math.random()*10) + '%';
      stageEl.appendChild(el);
      setTimeout(() => el.remove(), 1900);
    }, i * 140);
  }
}

function showGameOver() {
  $('overlay-gameover').classList.remove('hidden');
  if (character) {
    character.rotation.set(-Math.PI/2, 0, 0);
    character.position.set(0, 0, 0);
  }
  if (currentAction) currentAction.stop();
}
function hideGameOver() { $('overlay-gameover').classList.add('hidden'); }

function showStart() {
  $('overlay-start').classList.remove('hidden');
  $('overlay-gameover').classList.add('hidden');
  $('overlay-clear').classList.add('hidden');
}
function hideStart() { $('overlay-start').classList.add('hidden'); }

function showClear() {
  $('overlay-clear').classList.remove('hidden');
  const c = $('confetti-container');
  c.innerHTML = '';
  const e = ['🌈','✨','💖','🎉','⭐','💫','🌟','🎊'];
  for (let i = 0; i < 25; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = e[Math.floor(Math.random()*e.length)];
    el.style.left = Math.random()*100 + '%';
    el.style.animationDelay = Math.random()*2 + 's';
    el.style.animationDuration = (2.5 + Math.random()*2) + 's';
    c.appendChild(el);
  }
}
function hideClear() { $('overlay-clear').classList.add('hidden'); }

async function restartGame() {
  stats = DEFAULTS();
  stats.started = true;
  lastStageId = null;
  lastMoodTrigger = 0;
  actionState = null;
  hideGameOver();
  hideClear();
  hideStart();
  if (character) {
    character.rotation.set(0, 0, 0);
    character.position.set(0, 0, 0);
    character.scale.setScalar(baseScale);
  }
  if (defaultAnimName) playAnimation(defaultAnimName, true, 0.3);
  spawnParts(['🥚','✨','🎉','💖']);
  showMessage('あたらしいバヤシが うまれた！');
  updateUI();
  updateStageUI();
  await saveStats();
}

const ACTIONS = {
  feed: () => {
    if (stats.hunger > 90) { showMessage('もう おなかいっぱい'); return false; }
    stats.hunger = clamp(stats.hunger + 30);
    stats.cleanliness = clamp(stats.cleanliness - 4);
    showMessage('もぐもぐ🍚'); return true;
  },
  play: () => {
    if (stats.energy < 15) { showMessage('つかれた…'); return false; }
    stats.happiness = clamp(stats.happiness + 25);
    stats.energy = clamp(stats.energy - 15);
    stats.hunger = clamp(stats.hunger - 8);
    stats.cleanliness = clamp(stats.cleanliness - 5);
    showMessage('たのしい🎾'); return true;
  },
  sleep: () => {
    if (stats.energy > 90) { showMessage('もう ねむくない'); return false; }
    stats.energy = clamp(stats.energy + 40);
    stats.hunger = clamp(stats.hunger - 8);
    showMessage('すやすや💤'); return true;
  },
  bath: () => {
    if (stats.cleanliness > 90) { showMessage('ピカピカだよ'); return false; }
    stats.cleanliness = clamp(stats.cleanliness + 40);
    stats.happiness = clamp(stats.happiness + 5);
    showMessage('さっぱり🛁'); return true;
  },
  pet: () => {
    stats.happiness = clamp(stats.happiness + 12);
    showMessage('うれしい💖'); return true;
  }
};

function triggerActionAnim(type) {
  spawnParts(PARTS[type] || ['✨']);
  const matches = findAllClipNames(ACTION_KWS[type] || []);
  const name = matches.length ? matches[Math.floor(Math.random()*matches.length)] : null;
  if (name) {
    const d = animClips[name].duration;
    actionState = { type, timer: 0, duration: Math.max(d, 1.2), useAnim: true };
    playAnimation(name, false, 0.2);
  } else {
    const durs = { feed: 2.5, play: 3.0, sleep: 4.0, bath: 3.0, pet: 1.8 };
    actionState = { type, timer: 0, duration: durs[type] || 2, useAnim: false };
  }
}

function triggerMood(key) {
  const m = MOOD_ANIMS[key];
  if (!m) return;
  showMessage(m.msg);
  spawnParts(m.parts);
  const avail = m.clips.filter(n => animClips[n]);
  if (avail.length) {
    const name = avail[Math.floor(Math.random()*avail.length)];
    const d = animClips[name].duration;
    actionState = { type: 'mood_'+key, timer: 0, duration: Math.max(d, 2), useAnim: true };
    playAnimation(name, false, 0.4);
  }
}

function checkMood() {
  if (stats.isDead || actionState) return;
  const now = Date.now();
  if (now - lastMoodTrigger < MOOD_CD) return;
  const { hunger, energy, happiness, cleanliness } = stats;
  const avg = (hunger + energy + happiness + cleanliness) / 4;
  let key = null;
  if (hunger < 25) key = 'hungry';
  else if (energy < 25) key = 'tired';
  else if (happiness < 25) key = 'sad';
  else if (cleanliness < 25) key = 'dirty';
  else if (avg > 80 && Math.random() < 0.5) key = 'joyful';
  if (key) { triggerMood(key); lastMoodTrigger = now; }
}

// ==================== SAVE/LOAD ====================
async function saveStats() {
  stats.lastUpdate = Date.now();
  await storage.set(STORAGE_KEY, JSON.stringify(stats));
}
async function loadStats() {
  try {
    const res = await storage.get(STORAGE_KEY);
    if (res && res.value) {
      const saved = JSON.parse(res.value);
      // No offline decay — stats pause while tab is closed
      stats = {
        hunger: saved.hunger ?? 95,
        energy: saved.energy ?? 95,
        happiness: saved.happiness ?? 95,
        cleanliness: saved.cleanliness ?? 95,
        lastUpdate: Date.now(),
        birthTime: saved.birthTime || Date.now(),
        isDead: saved.isDead || false,
        cleared: saved.cleared || false,
        started: saved.started || false
      };
    }
  } catch(e) {}
  updateUI();
  updateStageUI();
  // Show start screen if not started yet or dead
  if (!stats.started || stats.isDead) {
    showStart();
  }
}

// ==================== RENDER LOOP ====================
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  if (getCurrentStage().id === 'rainbow') {
    ringMat.color.setHSL((performance.now() * 0.0003) % 1, 0.9, 0.6);
  }

  if (stats.isDead) {
    if (character) {
      character.rotation.set(-Math.PI/2, 0, 0);
      character.position.set(0, 0, 0);
      character.scale.setScalar(baseScale);
    }
    controls.update();
    renderer.render(scene, camera);
    return;
  }

  let mixerSpeed = walkSpeed;
  let idleSway = true;

  if (character && actionState) {
    actionState.timer += delta;
    const p = actionState.timer / actionState.duration;
    if (p >= 1) {
      character.scale.setScalar(baseScale);
      character.rotation.set(0, 0, 0);
      character.position.set(0, 0, 0);
      if (actionState.useAnim && defaultAnimName) playAnimation(defaultAnimName, true, 0.4);
      actionState = null;
    } else if (actionState.useAnim) {
      mixerSpeed = 1;
      idleSway = false;
    } else {
      idleSway = false;
      switch (actionState.type) {
        case 'feed': {
          mixerSpeed = 0.3;
          const b = Math.sin(actionState.timer * 14) * 0.08;
          character.scale.set(baseScale*(1-b*0.3), baseScale*(1+b), baseScale*(1-b*0.3));
          break;
        }
        case 'play':
          mixerSpeed = 2.4;
          character.position.y = Math.abs(Math.sin(actionState.timer*8)) * 0.15;
          character.rotation.y = Math.sin(actionState.timer*4) * 0.4;
          break;
        case 'sleep':
          mixerSpeed = 0;
          character.rotation.x = -Math.PI/2 * Math.min(p*2.5, 1);
          break;
        case 'bath':
          mixerSpeed = 0.2;
          character.position.y = Math.abs(Math.sin(actionState.timer*5)) * 0.1;
          break;
        case 'pet':
          mixerSpeed = 1.5;
          character.position.y = Math.abs(Math.sin(actionState.timer*10)) * 0.25;
          break;
      }
    }
  }

  if (mixer) mixer.update(delta * mixerSpeed);

  if (character && idleSway && !actionState) {
    character.position.set(0, 0, 0);
    character.rotation.x = 0;
    character.rotation.z = 0;
    character.rotation.y = Math.sin(performance.now() * 0.0008) * 0.15;
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();

// ==================== EVENT BINDINGS ====================
document.querySelectorAll('button.action').forEach(btn => {
  btn.addEventListener('click', async () => {
    if (stats.isDead) return;
    const action = btn.dataset.action;
    if (ACTIONS[action]()) triggerActionAnim(action);
    updateUI();
    await saveStats();
  });
});

$('btn-start').addEventListener('click', restartGame);
$('btn-restart').addEventListener('click', restartGame);
$('btn-continue').addEventListener('click', hideClear);
$('btn-reset').addEventListener('click', async () => {
  if (!confirm('セーブデータをリセットしますか？')) return;
  await restartGame();
});

// ==================== TIMERS ====================
setInterval(async () => {
  if (!stats.started || stats.isDead) { updateStageUI(); return; }
  stats.hunger = Math.max(0, stats.hunger - DECAY_PER_SEC.hunger);
  stats.energy = Math.max(0, stats.energy - DECAY_PER_SEC.energy);
  stats.happiness = Math.max(0, stats.happiness - DECAY_PER_SEC.happiness);
  stats.cleanliness = Math.max(0, stats.cleanliness - DECAY_PER_SEC.cleanliness);
  updateUI();
  updateStageUI();
  if (anyStatZero()) {
    stats.isDead = true;
    showMessage('バヤシが たおれた…');
    spawnParts(['💧','😢','💤']);
    setTimeout(showGameOver, 800);
  }
  await saveStats();
}, 1000);

setInterval(checkMood, 10000);

// ==================== INIT ====================
loadStats();
</script>
</body>
</html>
